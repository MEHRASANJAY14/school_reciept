<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#002147,#4e73df);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:18px 10px 8px;
}

.header h1{
  margin:5px 0;
  font-size:19px;
}

.header p{
  margin:3px 0;
  font-size:12px;
}

.date{
  margin-top:6px;
}

#greeting{
  font-size:13px;
  font-weight:500;
}

.digital-clock{
  font-size:15px;
  font-weight:600;
  letter-spacing:1px;
  margin-top:3px;
}

.quote{
  margin-top:5px;
  font-size:12px;
  font-style:italic;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

/* MAIN CONTENT */
.container{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:0 20px;
}

.card{
  background:white;
  border-radius:12px;
  padding:18px 12px;
  width:200px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  transition:0.3s;
  cursor:pointer;
  color:#002147;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.35);
}

.icon{
  font-size:28px;
  margin-bottom:6px;
}

.card h3{
  margin:5px 0;
  font-size:13px;
}

/* FOOTER */
.footer{
  background:rgba(0,0,0,0.2);
  text-align:center;
  padding:8px 5px;
  font-size:12px;
  letter-spacing:0.5px;
}

/* Responsive */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
  .card{
    width:85%;
  }
}

</style>
</head>

<body>

<div class="header">

<h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>

<div class="date">
  <div id="greeting"></div>
  <div id="clock" class="digital-clock"></div>
  <div id="quote" class="quote"></div>
</div>

</div>

<div class="container">

<div class="card" onclick="location.href='new-entry.html'">
<div class="icon">📝</div>
<h3>New Student Entry</h3>
</div>

<div class="card" onclick="location.href='existing-records.html'">
<div class="icon">📋</div>
<h3>Existing Records</h3>
</div>

<div class="card" onclick="location.href='search-print.html'">
<div class="icon">🔎</div>
<h3>Search & Print</h3>
</div>

</div>

<div class="footer">
© 2026 Govt Higher Secondary School Singhpur | Designed & Maintained by School IT Cell
</div>

<script>

// Date + Time + Greeting
function updateDateTime(){

  const now = new Date();

  const day = String(now.getDate()).padStart(2,'0');

  const monthNames = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];

  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const month = monthNames[now.getMonth()];
  const year = now.getFullYear();
  const dayName = dayNames[now.getDay()];

  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2,'0');
  const seconds = String(now.getSeconds()).padStart(2,'0');

  let greetingText = "";
  if(hours < 12){
    greetingText = "🌅 Good Morning";
  } else if(hours < 17){
    greetingText = "☀ Good Afternoon";
  } else {
    greetingText = "🌙 Good Evening";
  }

  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12;
  hours = String(hours).padStart(2,'0');

  const formatted = dayName + ", " + day + "-" + month + "-" + year +
                    " | " + hours + ":" + minutes + ":" + seconds + " " + ampm;

  document.getElementById("clock").innerText = formatted;
  document.getElementById("greeting").innerText = greetingText;
}

setInterval(updateDateTime,1000);
updateDateTime();

// Motivational Quotes
const quotes = [
  "📘 Education is the most powerful weapon to change the world.",
  "🎓 Learning never exhausts the mind.",
  "🌟 Success is the sum of small efforts repeated daily.",
  "📖 Knowledge gives confidence.",
  "🚀 Dream big. Work hard. Stay focused.",
  "🏆 Discipline is the bridge between goals and achievement."
];

let quoteIndex = 0;
const quoteElement = document.getElementById("quote");

function rotateQuotes(){
  quoteElement.style.opacity = 0;

  setTimeout(()=>{
    quoteElement.innerText = quotes[quoteIndex];
    quoteElement.style.opacity = 1;
    quoteIndex = (quoteIndex + 1) % quotes.length;
  },500);
}

setInterval(rotateQuotes,5000);
rotateQuotes();

</script>

</body>
</html>
