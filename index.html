<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GHSS Singhpur Student Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
h2 { text-align:center; }
input, select { padding:6px; width:300px; margin:5px 0; }
button { padding:8px 15px; margin-top:10px; }
.receipt { border:2px solid black; padding:20px; width:800px; margin-top:20px; }
.photo { float:right; width:120px; height:150px; object-fit:cover; border:1px solid black; }
</style>
</head>

<body>

<h2>Government Higher Secondary School<br>Singhpur</h2>

<h3>Student Entry Form</h3>

<form id="studentForm">

<input type="text" id="name" placeholder="Student Name" required><br>
<input type="text" id="father" placeholder="Father Name" required><br>
<input type="text" id="mother" placeholder="Mother Name" required><br>
<input type="date" id="dob" required><br>
<input type="text" id="class" placeholder="Class" required><br>
<input type="text" id="address" placeholder="Address"><br>
<input type="text" id="caste" placeholder="Caste"><br>
<input type="text" id="category" placeholder="Category"><br>
<input type="text" id="subject" placeholder="Subject"><br>
<input type="text" id="apar" placeholder="APAAR ID"><br>
<input type="text" id="aadhar" placeholder="Aadhar ID"><br>
<input type="text" id="samagra" placeholder="Samagra ID"><br>
<input type="text" id="account" placeholder="Account No"><br>
<input type="text" id="ifsc" placeholder="IFSC Code"><br>
<input type="text" id="bank" placeholder="Bank Name"><br>
<input type="text" id="mobile" placeholder="Mobile"><br>

<input type="file" id="photo" accept="image/*"><br>

<button type="submit">Submit & Generate Receipt</button>

</form>

<div id="receiptArea"></div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyQel4QVNj6i36arN8KK4ChLc2CJjEJtrKNVKmbqrgu6lGfjG3bk3-KMv77cVV19ACm/exec";

document.getElementById("studentForm").addEventListener("submit", function(e){
  e.preventDefault();

  let reader = new FileReader();
  let file = document.getElementById("photo").files[0];

  reader.onloadend = function() {

    let data = {
      name: name.value,
      father: father.value,
      mother: mother.value,
      dob: dob.value,
      class: class.value,
      address: address.value,
      caste: caste.value,
      category: category.value,
      subject: subject.value,
      apar: apar.value,
      aadhar: aadhar.value,
      samagra: samagra.value,
      account: account.value,
      ifsc: ifsc.value,
      bank: bank.value,
      mobile: mobile.value,
      photo: reader.result
    };

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {

      generateReceipt(data);

    });

  };

  if(file) reader.readAsDataURL(file);
});

function generateReceipt(student) {

  let receiptNo = "GHSS-" + Date.now();

  document.getElementById("receiptArea").innerHTML = `
  <div class="receipt" id="receiptContent">
  <h3 align="center">STUDENT INFORMATION RECEIPT</h3>
  <p><b>Receipt No:</b> ${receiptNo}</p>
  <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>

  <img src="${student.photo}" class="photo">

  <p><b>Name:</b> ${student.name}</p>
  <p><b>Father:</b> ${student.father}</p>
  <p><b>Mother:</b> ${student.mother}</p>
  <p><b>DOB:</b> ${student.dob}</p>
  <p><b>Class:</b> ${student.class}</p>
  <p><b>Subject:</b> ${student.subject}</p>
  <p><b>Caste:</b> ${student.caste}</p>
  <p><b>Category:</b> ${student.category}</p>
  <p><b>Address:</b> ${student.address}</p>

  <hr>
  <p><b>This is a computer generated receipt. No signature required.</b></p>
  </div>

  <br>
  <button onclick="downloadPDF()">Download PDF</button>
  `;
}

function downloadPDF() {
  var element = document.getElementById('receiptContent');
  html2pdf().from(element).save();
}

</script>

</body>
</html>
