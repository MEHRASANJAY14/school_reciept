<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#002147,#4e73df);
  color:white;
}

.header{
  text-align:center;
  padding:40px 15px 20px;
}

.logo{
  width:90px;
  height:90px;
  border-radius:50%;
  background:white;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#002147;
  font-size:40px;
  font-weight:bold;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.header h1{
  margin:15px 0 5px;
  font-size:22px;
}

.header p{
  margin:5px 0;
  font-size:14px;
}

.date{
  margin-top:10px;
}

#greeting{
  font-size:16px;
  font-weight:500;
}

.digital-clock{
  font-size:18px;
  font-weight:600;
  letter-spacing:2px;
  margin-top:5px;
}

.quote{
  margin-top:10px;
  font-size:14px;
  font-style:italic;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.container{
  max-width:1000px;
  margin:50px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:0 20px;
}

/* ✅ Updated White Compact Cards */
.card{
  background:white;
  border-radius:15px;
  padding:25px 15px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  transition:0.3s;
  cursor:pointer;
  color:#002147;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 25px rgba(0,0,0,0.35);
}

.icon{
  font-size:40px;
  margin-bottom:8px;
}

.card h3{
  margin:8px 0;
  font-size:16px;
}

.footer{
  text-align:center;
  margin-top:60px;
  font-size:13px;
  opacity:0.8;
  padding-bottom:25px;
}

@media(max-width:768px){
  .header h1{
    font-size:18px;
  }
}

</style>
</head>

<body>

<div class="header">
<div class="logo">🏫</div>
<h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>

<div class="date">
  <div id="greeting"></div>
  <div id="clock" class="digital-clock"></div>
  <div id="quote" class="quote"></div>
</div>

</div>

<div class="container">

<div class="card" onclick="location.href='new-entry.html'">
<div class="icon">📝</div>
<h3>New Student Entry</h3>
</div>

<div class="card" onclick="location.href='existing-records.html'">
<div class="icon">📋</div>
<h3>Existing Records</h3>
</div>

<div class="card" onclick="location.href='search-print.html'">
<div class="icon">🔎</div>
<h3>Search & Print</h3>
</div>

</div>

<div class="footer">
© 2026 Govt Higher Secondary School Singhpur | Digital Admission System
</div>

<script>

// Date + Time + Greeting
function updateDateTime(){

  const now = new Date();

  const day = String(now.getDate()).padStart(2,'0');

  const monthNames = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];

  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const month = monthNames[now.getMonth()];
  const year = now.getFullYear();
  const dayName = dayNames[now.getDay()];

  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2,'0');
  const seconds = String(now.getSeconds()).padStart(2,'0');

  let greetingText = "";
  if(hours < 12){
    greetingText = "🌅 Good Morning";
  } else if(hours < 17){
    greetingText = "☀ Good Afternoon";
  } else {
    greetingText = "🌙 Good Evening";
  }

  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12;
  hours = String(hours).padStart(2,'0');

  const formatted = dayName + ", " + day + "-" + month + "-" + year +
                    " | " + hours + ":" + minutes + ":" + seconds + " " + ampm;

  document.getElementById("clock").innerText = formatted;
  document.getElementById("greeting").innerText = greetingText;
}

setInterval(updateDateTime,1000);
updateDateTime();

// Motivational Quotes Rotation
const quotes = [
  "📘 Education is the most powerful weapon to change the world.",
  "🎓 Learning never exhausts the mind.",
  "🌟 Success is the sum of small efforts repeated daily.",
  "📖 Knowledge gives confidence.",
  "🚀 Dream big. Work hard. Stay focused.",
  "🏆 Discipline is the bridge between goals and achievement."
];

let quoteIndex = 0;
const quoteElement = document.getElementById("quote");

function rotateQuotes(){
  quoteElement.style.opacity = 0;

  setTimeout(()=>{
    quoteElement.innerText = quotes[quoteIndex];
    quoteElement.style.opacity = 1;
    quoteIndex = (quoteIndex + 1) % quotes.length;
  },500);
}

setInterval(rotateQuotes,5000);
rotateQuotes();

</script>

</body>
</html>
