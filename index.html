<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#0f2c59,#3f66c4);
}

.container{
  max-width:650px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:15px;
  color:#0f2c59;
}

.form-group{
  margin-bottom:12px;
}

label{
  font-size:13px;
  font-weight:600;
  color:#0f2c59;
}

input, select, textarea{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:4px;
  font-size:13px;
}

button{
  width:100%;
  padding:10px;
  background:#0f2c59;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin-top:12px;
}

button:hover{
  background:#163d7a;
}

.message{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  font-weight:600;
}

</style>
</head>
<body>

<div class="container">

<h2>New Student Entry</h2>

<form id="studentForm">

<div class="form-group">
<label>Student Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Father Name</label>
<input type="text" name="father">
</div>

<div class="form-group">
<label>Mother Name</label>
<input type="text" name="mother">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="form-group">
<label>Class *</label>
<select name="class" required>
<option value="">-- Select Class --</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
</div>

<div class="form-group">
<label>Village</label>
<input type="text" name="village">
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address"></textarea>
</div>

<div class="form-group">
<label>Caste</label>
<input type="text" name="caste">
</div>

<div class="form-group">
<label>Category *</label>
<select name="category" required>
<option value="">-- Select Category --</option>
<option value="GENERAL">GENERAL</option>
<option value="OBC">OBC</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="EWS">EWS</option>
<option value="OTHER">OTHER</option>
</select>
</div>

<div class="form-group">
<label>Subject</label>
<input type="text" name="subject">
</div>

<div class="form-group">
<label>APAAR ID</label>
<input type="text" name="apar">
</div>

<div class="form-group">
<label>Aadhaar ID</label>
<input type="text" name="aadhar">
</div>

<div class="form-group">
<label>Samagra ID</label>
<input type="text" name="samagra">
</div>

<div class="form-group">
<label>Account No</label>
<input type="text" name="account">
</div>

<div class="form-group">
<label>IFSC Code</label>
<input type="text" name="ifsc">
</div>

<div class="form-group">
<label>Bank Name</label>
<input type="text" name="bank">
</div>

<div class="form-group">
<label>Mobile</label>
<input type="text" name="mobile">
</div>

<button type="submit">Submit</button>

<div class="message" id="msg"></div>

</form>

</div>

<script>

const scriptURL = "YOUR_SCRIPT_URL_HERE"; // 🔥 replace with real URL

const form = document.getElementById("studentForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", e => {
  e.preventDefault();

  msg.style.color="blue";
  msg.innerText="Submitting... Please wait";

  const formData = new FormData(form);

  fetch(scriptURL, { method: "POST", body: formData })
    .then(res => res.text())
    .then(data => {

      if(data.includes("SUCCESS")){
        msg.style.color="green";
        msg.innerText="Data Submitted Successfully!";
        form.reset();
      }else{
        msg.style.color="red";
        msg.innerText="Server Error: " + data;
      }

    })
    .catch(error => {
      msg.style.color="red";
      msg.innerText="Submission Failed: " + error;
    });
});

</script>

</body>
</html>
