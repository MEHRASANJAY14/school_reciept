<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(-45deg,#002147,#4e73df,#001f3f,#003366);
  background-size:400% 400%;
  animation:gradientMove 12s ease infinite;
  color:white;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.header{
  text-align:center;
  padding:40px 15px 20px;
}

.logo{
  width:90px;
  height:90px;
  border-radius:50%;
  background:white;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#002147;
  font-size:40px;
  font-weight:bold;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.header h1{
  margin:15px 0 5px;
  font-size:22px;
}

.header p{
  margin:5px 0;
  font-size:14px;
}

.clock{
  margin-top:8px;
  font-size:14px;
  opacity:0.9;
}

.container{
  max-width:1100px;
  margin:50px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:40px 20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  background:rgba(255,255,255,0.25);
}

.icon{
  font-size:50px;
  margin-bottom:12px;
}

.card h3{
  margin:10px 0;
}

.footer{
  text-align:center;
  margin-top:60px;
  font-size:13px;
  opacity:0.8;
  padding-bottom:25px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">🏫</div>
<h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
<div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="card" onclick="location.href='new-entry.html'">
<div class="icon">📝</div>
<h3>New Student Entry</h3>
</div>

<div class="card" onclick="location.href='existing-records.html'">
<div class="icon">📋</div>
<h3>Existing Records</h3>
</div>

<div class="card" onclick="location.href='search-print.html'">
<div class="icon">🔎</div>
<h3>Search & Print</h3>
</div>

</div>

<div class="footer">
© 2026 Govt Higher Secondary School Singhpur | Digital Admission System
</div>

<script>

// Live Clock
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=
    now.toLocaleDateString()+" | "+now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
