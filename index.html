<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GHSS Singhpur - Student Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

h2,h3 { text-align:center; }

input {
  padding:8px;
  width:300px;
  margin-bottom:10px;
}

table { 
  border-collapse: collapse; 
  width: 100%; 
}

th, td { 
  border:1px solid black; 
  padding:8px; 
}

button { 
  padding:5px 10px; 
  cursor:pointer; 
}

img { 
  width:60px; 
  height:70px; 
  object-fit:cover;
}

.receipt {
  width: 800px;
  border:2px solid black;
  padding:20px;
  margin-top:20px;
}

.photo {
  float:right;
  width:120px;
  height:150px;
  border:1px solid black;
  object-fit:cover;
}
</style>
</head>

<body>

<h2>Government Higher Secondary School</h2>
<h3>Singhpur | Tehsil Jabera | District Damoh (M.P.)</h3>

<input type="text" id="searchBox" placeholder="Search by Name..." onkeyup="searchStudent()">

<table id="studentTable">
<tr>
<th>SN</th>
<th>Name</th>
<th>Class</th>
<th>Photo</th>
<th>Receipt</th>
</tr>
</table>

<div id="receiptArea"></div>

<script>

let studentsData = [];

fetch("https://script.google.com/macros/s/AKfycbyQel4QVNj6i36arN8KK4ChLc2CJjEJtrKNVKmbqrgu6lGfjG3bk3-KMv77cVV19ACm/exec")
.then(res => res.json())
.then(data => {
  studentsData = data;
  loadTable(data);
});

function loadTable(data) {
  let table = document.getElementById("studentTable");
  table.innerHTML = `
  <tr>
  <th>SN</th>
  <th>Name</th>
  <th>Class</th>
  <th>Photo</th>
  <th>Receipt</th>
  </tr>`;

  data.forEach(student => {
    let row = table.insertRow();
    row.insertCell(0).innerHTML = student.sn;
    row.insertCell(1).innerHTML = student.name;
    row.insertCell(2).innerHTML = student.class;
    row.insertCell(3).innerHTML = `<img src="${student.photo}">`;

    row.insertCell(4).innerHTML =
      `<button onclick='generateReceipt(${JSON.stringify(student)})'>Generate</button>`;
  });
}

function searchStudent() {
  let input = document.getElementById("searchBox").value.toLowerCase();
  let filtered = studentsData.filter(s => s.name.toLowerCase().includes(input));
  loadTable(filtered);
}

function generateReceipt(student) {

  let receiptNo = "GHSS-" + Date.now();

  document.getElementById("receiptArea").innerHTML = `
  <div class="receipt" id="receiptContent">
  <h3 align="center">STUDENT INFORMATION RECEIPT</h3>
  <p><b>Receipt No:</b> ${receiptNo}</p>
  <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>

  <img src="${student.photo}" class="photo">

  <p><b>Name:</b> ${student.name}</p>
  <p><b>Father:</b> ${student.father}</p>
  <p><b>Mother:</b> ${student.mother}</p>
  <p><b>DOB:</b> ${student.dob}</p>
  <p><b>Class:</b> ${student.class}</p>
  <p><b>Subject:</b> ${student.subject}</p>
  <p><b>Caste:</b> ${student.caste}</p>
  <p><b>Category:</b> ${student.category}</p>
  <p><b>Address:</b> ${student.address}</p>

  <hr>

  <p><b>APAAR ID:</b> ${student.apar}</p>
  <p><b>Aadhar:</b> ${student.aadhar}</p>
  <p><b>Samagra:</b> ${student.samagra}</p>
  <p><b>Bank:</b> ${student.bank}</p>
  <p><b>Account:</b> ${student.account}</p>
  <p><b>IFSC:</b> ${student.ifsc}</p>
  <p><b>Mobile:</b> ${student.mobile}</p>

  <hr>
  <p><b>This is a computer generated receipt. No signature required.</b></p>
  </div>
  <br>
  <button onclick="downloadPDF()">Download PDF</button>
  `;

}

function downloadPDF() {
  var element = document.getElementById('receiptContent');
  html2pdf().from(element).save();
}

</script>

</body>
</html>
