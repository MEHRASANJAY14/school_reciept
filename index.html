<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#002147,#4e73df);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px 10px;
}

.header h1{
  margin:4px 0;
  font-size:18px;
}

.header p{
  margin:2px 0;
  font-size:12px;
}

#greeting{
  font-size:13px;
}

.digital-clock{
  font-size:14px;
  font-weight:600;
}

.quote{
  font-size:12px;
  margin-top:4px;
  opacity:0;
  transition:opacity 1s;
}

/* MAIN */
.container{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:10px;
}

.card{
  background:white;
  border-radius:10px;
  padding:18px 12px;
  width:180px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  cursor:pointer;
  color:#002147;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.icon{
  font-size:24px;
  margin-bottom:5px;
}

.card h3{
  font-size:13px;
  margin:5px 0;
}

/* FIXED FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.3);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:8px;
  font-size:12px;
}

.footer button{
  background:white;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
  color:#002147;
  font-weight:600;
}

.footer button:hover{
  background:#f0f0f0;
}

/* Mobile */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
  .card{
    width:85%;
  }
}

</style>
</head>

<body>

<div class="header">

<h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>

<div id="greeting"></div>
<div id="clock" class="digital-clock"></div>
<div id="quote" class="quote"></div>

</div>

<div class="container">

<div class="card" onclick="location.href='new-entry.html'">
<div class="icon">📝</div>
<h3>New Student Entry</h3>
</div>

<div class="card" onclick="location.href='existing-records.html'">
<div class="icon">📋</div>
<h3>Existing Records</h3>
</div>

<div class="card" onclick="location.href='search-print.html'">
<div class="icon">🔎</div>
<h3>Search & Print</h3>
</div>

</div>

<div class="footer">
<button onclick="location.href='index.html'">🏠 Home</button>
<button onclick="location.reload()">🔄 Refresh</button>
<span>© 2026 GHSS Singhpur</span>
</div>

<script>

// Date + Greeting
function updateDateTime(){

  const now = new Date();
  const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const monthNames=["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];

  const day=String(now.getDate()).padStart(2,'0');
  const month=monthNames[now.getMonth()];
  const year=now.getFullYear();
  const dayName=dayNames[now.getDay()];

  let hours=now.getHours();
  const minutes=String(now.getMinutes()).padStart(2,'0');
  const seconds=String(now.getSeconds()).padStart(2,'0');

  let greeting="";
  if(hours<12) greeting="🌅 Good Morning";
  else if(hours<17) greeting="☀ Good Afternoon";
  else greeting="🌙 Good Evening";

  const ampm=hours>=12?"PM":"AM";
  hours=hours%12||12;

  document.getElementById("greeting").innerText=greeting;
  document.getElementById("clock").innerText=
    dayName+", "+day+"-"+month+"-"+year+
    " | "+String(hours).padStart(2,'0')+":"+minutes+":"+seconds+" "+ampm;
}

setInterval(updateDateTime,1000);
updateDateTime();

// Quotes
const quotes=[
"📘 Education is the most powerful weapon to change the world.",
"🎓 Learning never exhausts the mind.",
"🌟 Success is the sum of small efforts repeated daily.",
"📖 Knowledge gives confidence."
];

let i=0;
const q=document.getElementById("quote");

function rotateQuotes(){
  q.style.opacity=0;
  setTimeout(()=>{
    q.innerText=quotes[i];
    q.style.opacity=1;
    i=(i+1)%quotes.length;
  },500);
}

setInterval(rotateQuotes,5000);
rotateQuotes();

</script>

</body>
</html>
