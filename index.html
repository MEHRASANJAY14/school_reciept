<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Dashboard</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#002147,#4e73df);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px 10px 5px;
}

.header h1{
  margin:4px 0;
  font-size:18px;
}

.header p{
  margin:2px 0;
  font-size:12px;
}

.date{
  margin-top:5px;
}

#greeting{
  font-size:13px;
  font-weight:500;
}

.digital-clock{
  font-size:14px;
  font-weight:600;
}

.quote{
  margin-top:4px;
  font-size:12px;
  font-style:italic;
  opacity:0;
  transition:opacity 1s;
}

/* MAIN */
.container{
  display:flex;
  justify-content:center;
  gap:18px;
  padding:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

.card{
  background:white;
  border-radius:12px;
  padding:18px 12px;
  width:190px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.25);
  cursor:pointer;
  color:#002147;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.35);
}

.icon{
  font-size:26px;
  margin-bottom:6px;
}

.card h3{
  margin:5px 0;
  font-size:13px;
}

/* FOOTER */
.footer{
  margin-top:auto;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 20px;
  font-size:12px;
  border-top:1px solid rgba(255,255,255,0.3);
}

.footer-left{
  display:flex;
  gap:10px;
}

.footer button{
  background:white;
  border:none;
  padding:5px 12px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  color:#002147;
  font-weight:600;
  transition:0.3s;
}

.footer button:hover{
  background:#f0f0f0;
  transform:translateY(-2px);
}

.footer-center{
  text-align:center;
  flex:1;
}

@media(max-width:768px){
  .container{
    flex-direction:column;
    align-items:center;
  }
  .card{
    width:85%;
  }
  .footer{
    flex-direction:column;
    gap:6px;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="header">

<h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>

<div class="date">
  <div id="greeting"></div>
  <div id="clock" class="digital-clock"></div>
  <div id="quote" class="quote"></div>
</div>

</div>

<div class="container">

<div class="card" onclick="location.href='new-entry.html'">
<div class="icon">📝</div>
<h3>New Student Entry</h3>
</div>

<div class="card" onclick="location.href='existing-records.html'">
<div class="icon">📋</div>
<h3>Existing Records</h3>
</div>

<div class="card" onclick="location.href='search-print.html'">
<div class="icon">🔎</div>
<h3>Search & Print</h3>
</div>

</div>

<div class="footer">
  <div class="footer-left">
    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.reload()">🔄 Refresh</button>
  </div>

  <div class="footer-center">
    © 2026 Govt Higher Secondary School Singhpur | Digital Admission System
  </div>
</div>

<script>

// Date + Time + Greeting
function updateDateTime(){

  const now = new Date();
  const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const monthNames=["January","February","March","April","May","June",
                    "July","August","September","October","November","December"];

  const day=String(now.getDate()).padStart(2,'0');
  const month=monthNames[now.getMonth()];
  const year=now.getFullYear();
  const dayName=dayNames[now.getDay()];

  let hours=now.getHours();
  const minutes=String(now.getMinutes()).padStart(2,'0');
  const seconds=String(now.getSeconds()).padStart(2,'0');

  let greeting="";
  if(hours<12) greeting="🌅 Good Morning";
  else if(hours<17) greeting="☀ Good Afternoon";
  else greeting="🌙 Good Evening";

  const ampm=hours>=12?"PM":"AM";
  hours=hours%12||12;

  document.getElementById("greeting").innerText=greeting;
  document.getElementById("clock").innerText=
    dayName+", "+day+"-"+month+"-"+year+
    " | "+String(hours).padStart(2,'0')+":"+minutes+":"+seconds+" "+ampm;
}

setInterval(updateDateTime,1000);
updateDateTime();

// Motivational Quotes
const quotes=[
"📘 Education is the most powerful weapon to change the world.",
"🎓 Learning never exhausts the mind.",
"🌟 Success is the sum of small efforts repeated daily.",
"📖 Knowledge gives confidence.",
"🚀 Dream big. Work hard. Stay focused."
];

let i=0;
const q=document.getElementById("quote");

function rotateQuotes(){
  q.style.opacity=0;
  setTimeout(()=>{
    q.innerText=quotes[i];
    q.style.opacity=1;
    i=(i+1)%quotes.length;
  },500);
}

setInterval(rotateQuotes,5000);
rotateQuotes();

</script>

</body>
</html>
