<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHSS Singhpur Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  overflow:hidden; /* 🚫 No Scroll */
  font-family:'Segoe UI',sans-serif;
}

body{
  background:linear-gradient(160deg,#0f2c59,#3f66c4);
  color:white;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  text-align:center;
  padding:12px 10px 5px;
}

.header h1{
  font-size:18px;
  letter-spacing:1px;
}

.header p{
  font-size:11px;
  opacity:0.9;
}

.time-section{
  margin-top:6px;
}

#greeting{
  font-size:13px;
  margin-bottom:3px;
}

.digital-clock{
  font-size:14px;
  font-weight:600;
}

.quote{
  font-size:11px;
  margin-top:3px;
  opacity:0.9;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card-container{
  width:90%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:white;
  border-radius:20px;
  padding:22px;
  text-align:center;
  color:#0f2c59;
  font-weight:600;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
}

.card span{
  display:block;
  font-size:28px;
  margin-bottom:6px;
}

/* FOOTER */
.footer{
  background:rgba(0,0,0,0.3);
  padding:10px 10px;
  text-align:center;
  font-size:11px;
}

.footer-buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:6px;
}

.footer button{
  background:white;
  border:none;
  padding:5px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:11px;
  font-weight:600;
  color:#0f2c59;
  transition:0.3s;
}

.footer button:hover{
  background:#eaeaea;
  transform:translateY(-2px);
}

.footer-text{
  opacity:0.85;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="header">
  <h1>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h1>
  <p>Block: Jabera | District: Damoh (M.P.) | Estd. 1985</p>

  <div class="time-section">
    <div id="greeting"></div>
    <div id="clock" class="digital-clock"></div>
    <div id="quote" class="quote"></div>
  </div>
</div>

<div class="main">
  <div class="card-container">

    <div class="card" onclick="location.href='new-entry.html'">
      <span>📝</span>
      New Student Entry
    </div>

    <div class="card" onclick="location.href='existing-records.html'">
      <span>📋</span>
      Student Records
    </div>

    <div class="card" onclick="location.href='search.html'">
      <span>🔎</span>
      Search & Print
    </div>

  </div>
</div>

<div class="footer">

  <div class="footer-buttons">
    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.reload()">🔄 Refresh</button>
  </div>

  <div class="footer-text">
    © 2026 GHSS Singhpur <br>
    Designed & Maintained by School IT Cell
  </div>

</div>

<script>

// TIME + GREETING
function updateTime(){
  const now=new Date();
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

  let h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');

  let greet="";
  if(h<12) greet="🌅 Good Morning";
  else if(h<17) greet="☀ Good Afternoon";
  else greet="🌙 Good Evening";

  const ampm=h>=12?"PM":"AM";
  h=h%12||12;

  document.getElementById("greeting").innerText=greet;
  document.getElementById("clock").innerText=
    days[now.getDay()]+", "+
    String(now.getDate()).padStart(2,'0')+"-"+months[now.getMonth()]+"-"+now.getFullYear()+
    " | "+String(h).padStart(2,'0')+":"+m+":"+s+" "+ampm;
}

setInterval(updateTime,1000);
updateTime();

// QUOTES
const quotes=[
"Education is the most powerful weapon to change the world.",
"Discipline is the bridge between goals and success.",
"Learning never exhausts the mind."
];

let i=0;
function rotateQuote(){
  document.getElementById("quote").innerText=quotes[i];
  i=(i+1)%quotes.length;
}
setInterval(rotateQuote,5000);
rotateQuote();

</script>

</body>
</html>
