<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#0f2c59,#3f66c4);
}
.subject-container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:10px;
  margin-top:6px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  background:#f8f9fa;
}

.subject-container label{
  background:white;
  padding:6px 8px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:0.2s;
}

.subject-container label:hover{
  background:#e9f2ff;
}

.subject-container input{
  transform:scale(1.1);
}

.subject-container input:checked + span{
  color:green;
  font-weight:bold;
}

.container{
  max-width:850px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  color:#0f2c59;
}

.form-group{
  margin-bottom:12px;
}

label{
  font-size:13px;
  font-weight:600;
  color:#0f2c59;
}

input, select, textarea{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:4px;
  font-size:13px;
}

.button-row{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.button-row button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  color:white;
}

.submit-btn{ background:#0f2c59; }
.back-btn{ background:#6c757d; }

.message{
  text-align:center;
  margin-top:10px;
  font-weight:600;
}

.preview img{
  max-width:120px;
  margin-top:6px;
  border-radius:8px;
}

.success-box{
  display:none;
  margin-top:20px;
  text-align:center;
}

.success-box button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.new-btn{ background:#1e7e34; }
.dashboard-btn{ background:#0056b3; }
.print-btn{ background:#c82333; }

</style>
</head>
<body>

<div class="container">

<h2>New Student Entry</h2>

<form id="studentForm">

<div class="form-group">
<label>Student Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Father Name</label>
<input type="text" name="father">
</div>

<div class="form-group">
<label>Mother Name</label>
<input type="text" name="mother">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="form-group">
<label>Class *</label>
<select name="class" id="class" onchange="loadSubjects()" required>
<option value="">-- Select Class --</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>
</div>

<div class="form-group">
<label>Village</label>
<input type="text" name="village">
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address"></textarea>
</div>

<div class="form-group">
<label>Caste</label>
<input type="text" name="caste">
</div>

<div class="form-group">
<label>Category *</label>
<select name="category" required>
<option value="">-- Select Category --</option>
<option>GENERAL</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>EWS</option>
<option>OTHER</option>
</select>
</div>

<div class="form-group">
<label>Select Subjects</label>

<div class="subject-container" id="subjectsBox"></div>
</div>

<div class="form-group">
<label>APAAR ID</label>
<input type="text" name="apar">
</div>

<div class="form-group">
<label>Aadhaar ID (12 Digit)</label>
<input type="text" name="aadhar" maxlength="12">
</div>

<div class="form-group">
<label>Samagra ID</label>
<input type="text" name="samagra">
</div>

<div class="form-group">
<label>Account No</label>
<input type="text" name="account">
</div>

<div class="form-group">
<label>IFSC Code</label>
<input type="text" name="ifsc">
</div>

<div class="form-group">
<label>Bank Name</label>
<input type="text" name="bank">
</div>

<div class="form-group">
<label>Mobile (10 Digit)</label>
<input type="text" name="mobile" maxlength="10">
</div>

<div class="form-group">
<label>Student Photo</label>
<input type="file" id="photo" accept="image/*">
<div class="preview" id="preview"></div>
</div>

<div class="button-row">
<button type="submit" class="submit-btn">Submit</button>
<button type="button" class="back-btn" onclick="location.href='index.html'">⬅ Back</button>
</div>

<div class="message" id="msg"></div>

</form>

<div class="success-box" id="successBox">
<h3 id="successText"></h3>
<button class="new-btn" onclick="location.reload()">➕ Back to New Entry</button>
<button class="dashboard-btn" onclick="location.href='index.html'">🏠 Back to Dashboard</button>
<button class="print-btn" onclick="printReceipt()">🖨 Print Receipt</button>
</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

let studentId="";
let photoUrl="";

const form=document.getElementById("studentForm");
const msg=document.getElementById("msg");
const successBox=document.getElementById("successBox");
const successText=document.getElementById("successText");
const preview=document.getElementById("preview");

document.getElementById("photo").addEventListener("change",function(){
  const file=this.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){
      preview.innerHTML='<img src="'+e.target.result+'">';
    }
    reader.readAsDataURL(file);
  }
});

form.addEventListener("submit",e=>{
  e.preventDefault();

  const aadhar=form.aadhar.value;
  const mobile=form.mobile.value;

  if(aadhar && !/^\d{12}$/.test(aadhar)){
    msg.style.color="red";
    msg.innerText="Aadhaar must be 12 digits.";
    return;
  }

  if(mobile && !/^\d{10}$/.test(mobile)){
    msg.style.color="red";
    msg.innerText="Mobile must be 10 digits.";
    return;
  }

  msg.style.color="blue";
  msg.innerText="Submitting... Please wait";

  Array.from(form.elements).forEach(el=>{
    if(el.type==="text") el.value=el.value.toUpperCase();
  });

  const formData=new FormData(form);
  formData.set("subject", getSelectedSubjects());
  const file=document.getElementById("photo").files[0];

  if(file){

    const reader=new FileReader();

    reader.onload=function(e){

      formData.append("photo",e.target.result);

      fetch(scriptURL,{method:"POST",body:formData})
      .then(res=>res.json())
      .then(data=>handleResponse(data))
      .catch(err=>{
        msg.style.color="red";
        msg.innerText="Submission Failed: "+err;
      });

    };

    reader.readAsDataURL(file);

  }else{

    fetch(scriptURL,{method:"POST",body:formData})
    .then(res=>res.json())
    .then(data=>handleResponse(data))
    .catch(err=>{
      msg.style.color="red";
      msg.innerText="Submission Failed: "+err;
    });

  }

});
  
function getSelectedSubjects(){

let selected=[];

document.querySelectorAll('input[name="subject"]:checked')
.forEach(el=>{
selected.push(el.value);
});

return selected.join(", ");

}
  function loadSubjects(){

let cls=document.getElementById("class").value;
let box=document.getElementById("subjectsBox");

box.innerHTML="";

let list=[];

// 9-10
if(cls=="9" || cls=="10"){
list=[
"Hindi - 401",
"English - 411",
"Sanskrit - 512",
"Math Standard - 100",
"Math Basic - 101",
"Science - 200",
"Social Science - 300",
"IT - 863",
"BFSI - 876"
];
}

// 11-12
else if(cls=="11" || cls=="12"){
list=[
"Hindi - 051",
"English - 052",
"Political Science - 130",
"History - 110",
"Economics - 140",
"Physics - 210",
"Chemistry - 220",
"Biology - 230",
"BFSI - 982",
"IT/ITES - 975",
"Sanskrit - 053"
];
}

// checkbox create
list.forEach(function(sub){

box.innerHTML+=`
<label style="display:block">
<input type="checkbox" name="subject" value="${sub}"> ${sub}
</label>
`;

});

}

function handleResponse(data){

  if(data.status==="DUPLICATE_AADHAAR"){
    msg.style.color="red";
    msg.innerText="Duplicate Aadhaar Found!";
    return;
  }

  if(data.status==="SUCCESS"){
    studentId=data.id;
    photoUrl=data.photo;
    form.style.display="none";
    successBox.style.display="block";
    successText.innerText="Data Submitted Successfully! Student ID: "+studentId;
  }else{
    msg.style.color="red";
    msg.innerText="Unexpected Server Error";
  }

}

function printReceipt(){

  const win = window.open("about:blank","_blank");

  const params = new URLSearchParams();

  // ✅ SUBJECT FIX (IMPORTANT)
  let selectedSubjects = [];

  document.querySelectorAll('input[name="subject"]:checked')
  .forEach(el=>{
    selectedSubjects.push(el.value);
  });

  let subject = selectedSubjects.join(", ");

  // ===== DATA =====
  params.append("studentID",studentId);
  params.append("name",form.name.value);
  params.append("father",form.father.value);
  params.append("mother",form.mother.value);
  params.append("dob",form.dob.value);
  params.append("class",form.class.value);
  params.append("village",form.village.value);
  params.append("address",form.address.value);
  params.append("caste",form.caste.value);
  params.append("category",form.category.value);

  // ✅ सही subject भेजो
  params.append("subject",subject);

  params.append("apar",form.apar.value);
  params.append("aadhar",form.aadhar.value);
  params.append("samagra",form.samagra.value);
  params.append("account",form.account.value);
  params.append("ifsc",form.ifsc.value);
  params.append("bank",form.bank.value);
  params.append("mobile",form.mobile.value);

  if(photoUrl){
    params.append("photo",photoUrl);
  }

  win.location = "print.html?" + params.toString();
}

</script>

</body>
</html>
