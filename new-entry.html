<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(to right,#e3f2fd,#f4f6f9);
  margin:0;
}

.header{
  background:#002147;
  color:white;
  text-align:center;
  padding:18px;
}

.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h3{
  text-align:center;
  margin-bottom:20px;
}

.form-row{
  display:grid;
  grid-template-columns: 220px 1fr;
  align-items:center;
  margin-bottom:14px;
}

label{
  font-weight:bold;
}

input, select{
  padding:8px;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
  text-transform:uppercase;
  transition:0.3s;
}

input:focus, select:focus{
  border-color:#002147;
  outline:none;
}

.error{
  border-color:red !important;
}

button{
  width:100%;
  padding:12px;
  background:#002147;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  background:gray;
}

.message{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.success{color:green;}
.loading{color:#d35400;}
.error-msg{color:red;}

@media(max-width:768px){
  .form-row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
<h2>Government Higher Secondary School</h2>
<p>Student Admission Form</p>
</div>

<div class="container">

<h3>Enter Student Details</h3>

<form id="mainForm" method="POST"
action="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec">

<div class="form-row">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-row">
<label>Father Name</label>
<input type="text" name="father">
</div>

<div class="form-row">
<label>Mother Name</label>
<input type="text" name="mother">
</div>

<div class="form-row">
<label>Date of Birth</label>
<input type="date" name="dob" style="text-transform:none;">
</div>

<div class="form-row">
<label>Class</label>
<select name="class" id="classSelect" required>
  <option value="" disabled selected>-- SELECT CLASS --</option>
  <option value="9">9</option>
  <option value="10">10</option>
  <option value="11">11</option>
  <option value="12">12</option>
</select>
</div>

<div class="form-row">
<label>Caste</label>
<select name="caste" id="casteSelect" required>
  <option value="" disabled selected>-- SELECT CASTE --</option>
  <option value="GENERAL">GENERAL</option>
  <option value="EWS">EWS</option>
  <option value="SC">SC</option>
  <option value="ST">ST</option>
  <option value="OBC">OBC</option>
  <option value="OTHER">OTHER</option>
</select>
</div>

<div class="form-row">
<label>Village</label>
<input type="text" name="village">
</div>

<div class="form-row">
<label>Address</label>
<input type="text" name="address">
</div>

<div class="form-row">
<label>Subject</label>
<input type="text" name="subject">
</div>

<div class="form-row">
<label>APAAR ID</label>
<input type="text" name="apar">
</div>

<div class="form-row">
<label>AADHAR ID</label>
<input type="text" name="aadhar">
</div>

<div class="form-row">
<label>Samagra ID</label>
<input type="text" name="samagra">
</div>

<div class="form-row">
<label>Account No</label>
<input type="text" name="account">
</div>

<div class="form-row">
<label>IFSC Code</label>
<input type="text" name="ifsc">
</div>

<div class="form-row">
<label>Bank Name</label>
<input type="text" name="bank">
</div>

<div class="form-row">
<label>Mobile</label>
<input type="text" name="mobile">
</div>

<div class="form-row">
<label>Photo</label>
<input type="file" id="photoInput" accept="image/*">
<input type="hidden" name="photo" id="photoData">
</div>

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<script>

const form = document.getElementById("mainForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");
const classSelect = document.getElementById("classSelect");
const casteSelect = document.getElementById("casteSelect");

form.addEventListener("submit", function(e){

  e.preventDefault();

  // Custom validation
  let valid = true;

  if(classSelect.value === ""){
    classSelect.classList.add("error");
    valid = false;
  } else {
    classSelect.classList.remove("error");
  }

  if(casteSelect.value === ""){
    casteSelect.classList.add("error");
    valid = false;
  } else {
    casteSelect.classList.remove("error");
  }

  if(!valid){
    msg.innerHTML="Please select Class and Caste properly ⚠";
    msg.className="message error-msg";
    return;
  }

  msg.innerHTML="Submitting... Please wait ⏳";
  msg.className="message loading";
  btn.disabled=true;

  const file = document.getElementById("photoInput").files[0];

  if(file){
    const reader = new FileReader();
    reader.onload=function(){
      document.getElementById("photoData").value=reader.result;
      form.submit();
    }
    reader.readAsDataURL(file);
  } else {
    form.submit();
  }

});

</script>

</body>
</html>
