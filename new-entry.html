<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#002147;color:white;text-align:center;padding:15px}
.container{max-width:1000px;margin:30px auto;background:white;padding:25px;border-radius:10px}
.section-title{margin-top:20px;font-weight:bold;border-bottom:2px solid #002147;padding-bottom:5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:10px}
input,select{padding:8px;width:100%}
.full{grid-column:span 2}
button{grid-column:span 2;padding:12px;background:#002147;color:white;border:none}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}button{grid-column:span 1}}
</style>
</head>

<body>

<div class="header">
<h2>Government Higher Secondary School</h2>
<p>Student Admission Form</p>
</div>

<div class="container">

<form id="mainForm" class="form-grid">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name">

<input type="text" id="mother" placeholder="Mother Name">
<input type="date" id="dob">

<input type="text" id="class" placeholder="Class">
<input type="text" id="category" placeholder="Category">

<input type="text" id="caste" placeholder="Caste">
<input type="text" id="mobile" placeholder="Mobile">

<input type="text" id="address" placeholder="Address" class="full">

<input type="text" id="aadhar" placeholder="Aadhar No">
<input type="file" id="photo" accept="image/*">

<button type="submit">Save Student</button>

</form>

<div id="msg" style="margin-top:15px;font-weight:bold;"></div>

</div>

<script>

alert("JS Loaded Successfully");
const scriptURL = "https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

document.getElementById("mainForm").addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("msg").innerHTML="Saving...";

let file=document.getElementById("photo").files[0];

if(file){
let reader=new FileReader();
reader.onload=function(){submitData(reader.result);}
reader.readAsDataURL(file);
}else{
submitData("");
}

});

function submitData(photoData){

let form=document.createElement("form");
form.method="POST";
form.action=scriptURL;

let fields={
name:name.value,
father:father.value,
mother:mother.value,
dob:dob.value,
class:class.value,
category:category.value,
caste:caste.value,
address:address.value,
aadhar:aadhar.value,
mobile:mobile.value,
photo:photoData,
redirect:window.location.href
};

for(let key in fields){
let input=document.createElement("input");
input.type="hidden";
input.name=key;
input.value=fields[key];
form.appendChild(input);
}

document.body.appendChild(form);
form.submit();
}

</script>

</body>
</html>
