<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>

body{
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#002147,#4e73df);
}

.header{
  text-align:center;
  color:white;
  padding:25px 10px;
}

.header h2{
  margin:0;
  letter-spacing:1px;
}

.header p{
  margin:4px 0;
  font-size:14px;
}

.container{
  max-width:1100px;
  margin:20px auto;
  background:rgba(255,255,255,0.95);
  padding:35px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
  animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.form-row{
  display:grid;
  grid-template-columns:220px 1fr;
  margin-bottom:16px;
  align-items:center;
}

label{
  font-weight:600;
  color:#002147;
}

input, select{
  padding:11px;
  border-radius:10px;
  border:1px solid #ccc;
  width:100%;
  transition:all 0.3s ease;
  font-size:14px;
}

input:focus, select:focus{
  border-color:#4e73df;
  box-shadow:0 0 8px rgba(78,115,223,0.4);
  outline:none;
  transform:scale(1.01);
}

button{
  width:100%;
  padding:13px;
  background:linear-gradient(to right,#002147,#004080);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button:disabled{
  background:gray;
  transform:none;
}

.message{
  margin-top:18px;
  font-weight:bold;
  text-align:center;
  font-size:15px;
}

.success{color:green;}
.error{color:red;}

@media(max-width:768px){
  .form-row{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="header">
<h2>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h2>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
</div>

<div class="container">

<form id="mainForm">

<!-- ALL ORIGINAL FIELDS (NO REMOVAL) -->

<div class="form-row"><label>Student Name</label><input type="text" name="name" required></div>
<div class="form-row"><label>Father Name</label><input type="text" name="father"></div>
<div class="form-row"><label>Mother Name</label><input type="text" name="mother"></div>
<div class="form-row"><label>Date of Birth</label><input type="date" name="dob"></div>

<div class="form-row">
<label>Class</label>
<select name="class" required>
<option value="" disabled selected>-- SELECT CLASS --</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
</div>

<div class="form-row"><label>Village</label><input type="text" name="village"></div>
<div class="form-row"><label>Address</label><input type="text" name="address"></div>
<div class="form-row"><label>Caste</label><input type="text" name="caste" required></div>

<div class="form-row">
<label>Category</label>
<select name="category" required>
<option value="" disabled selected>-- SELECT CATEGORY --</option>
<option value="GENERAL">GENERAL</option>
<option value="EWS">EWS</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="OBC">OBC</option>
<option value="OTHER">OTHER</option>
</select>
</div>

<div class="form-row"><label>Subject</label><input type="text" name="subject"></div>
<div class="form-row"><label>APAAR ID</label><input type="text" name="apar"></div>
<div class="form-row"><label>Aadhaar ID</label><input type="text" name="aadhar" maxlength="12" required></div>
<div class="form-row"><label>Samagra ID</label><input type="text" name="samagra"></div>
<div class="form-row"><label>Account No</label><input type="text" name="account"></div>
<div class="form-row"><label>IFSC Code</label><input type="text" name="ifsc"></div>
<div class="form-row"><label>Bank Name</label><input type="text" name="bank"></div>
<div class="form-row"><label>Mobile</label><input type="text" name="mobile"></div>
<div class="form-row"><label>Photo</label><input type="file" id="photoInput" accept="image/*"></div>

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<!-- SAME JS LOGIC (NO CHANGE) -->
<script>

const scriptURL="YOUR_APPS_SCRIPT_URL_HERE";

const form=document.getElementById("mainForm");
const msg=document.getElementById("msg");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",function(e){

e.preventDefault();
msg.innerHTML="Submitting... Please wait ⏳";
btn.disabled=true;

const formData=new FormData(form);
const file=document.getElementById("photoInput").files[0];

if(file){
const reader=new FileReader();
reader.onload=function(){
formData.append("photo",reader.result);
sendData(formData);
}
reader.readAsDataURL(file);
}else{
sendData(formData);
}

});

function sendData(formData){

fetch(scriptURL,{method:"POST",body:formData})
.then(res=>res.json())
.then(data=>{

if(data.status==="DUPLICATE"){
msg.innerHTML="⚠ Aadhaar already exists!";
msg.className="message error";
btn.disabled=false;
return;
}

if(data.status==="SUCCESS"){
msg.innerHTML="Data Submitted Successfully ✅";
msg.className="message success";
form.reset();
btn.disabled=false;
}

})
.catch(()=>{
msg.innerHTML="Submission Failed ❌";
msg.className="message error";
btn.disabled=false;
});
}

</script>

</body>
</html>
