<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

.header{
  background:#002147;
  color:white;
  text-align:center;
  padding:15px;
}

.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.section-title{
  margin-top:25px;
  font-weight:bold;
  border-bottom:2px solid #002147;
  padding-bottom:5px;
}

.form-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
  margin-top:10px;
}

label{
  font-weight:bold;
  font-size:14px;
}

input, select{
  padding:8px;
  width:100%;
  border:1px solid #ccc;
  border-radius:5px;
}

.full-width{
  grid-column: span 2;
}

button{
  margin-top:20px;
  padding:12px;
  background:#002147;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#00509e;
}

/* Mobile Responsive */
@media(max-width:768px){
  .form-grid{
    grid-template-columns: 1fr;
  }
  .full-width{
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>Government Higher Secondary School</h2>
  <p>Student Admission Form</p>
</div>

<div class="container">

<form>

<div class="section-title">Personal Details</div>

<div class="form-grid">

<div>
<label>Student Name</label>
<input type="text" placeholder="Enter student name">
</div>

<div>
<label>Father Name</label>
<input type="text" placeholder="Enter father name">
</div>

<div>
<label>Mother Name</label>
<input type="text" placeholder="Enter mother name">
</div>

<div>
<label>Date of Birth</label>
<input type="date">
</div>

<div>
<label>Class</label>
<select>
<option>Select Class</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>
</div>

<div>
<label>Subject</label>
<input type="text" placeholder="Enter subject">
</div>

</div>

<div class="section-title">Category Details</div>

<div class="form-grid">

<div>
<label>Category</label>
<select>
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
</select>
</div>

<div>
<label>Caste</label>
<input type="text" placeholder="Enter caste">
</div>

<div class="full-width">
<label>Address</label>
<input type="text" placeholder="Enter full address">
</div>

</div>

<div class="section-title">ID Details</div>

<div class="form-grid">

<div>
<label>APAAR ID</label>
<input type="text">
</div>

<div>
<label>Aadhar Number</label>
<input type="text" maxlength="12">
</div>

<div>
<label>Samagra ID</label>
<input type="text">
</div>

</div>

<div class="section-title">Bank Details</div>

<div class="form-grid">

<div>
<label>Bank Name</label>
<input type="text">
</div>

<div>
<label>Account Number</label>
<input type="text">
</div>

<div>
<label>IFSC Code</label>
<input type="text">
</div>

<div>
<label>Mobile Number</label>
<input type="text" maxlength="10">
</div>

<div class="full-width">
<label>Upload Photo</label>
<input type="file" accept="image/*">
</div>

</div>

<button type="submit">Save Student Details</button>

</form>

</div>

</body>
</html>
