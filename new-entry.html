<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg,#002147,#4e73df);
  margin:0;
}

.header{
  text-align:center;
  color:white;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:20px auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.form-row{
  display:grid;
  grid-template-columns:220px 1fr;
  margin-bottom:15px;
  align-items:center;
}

label{
  font-weight:bold;
  color:#002147;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  text-transform:uppercase;
  transition:0.3s;
}

input:focus, select:focus{
  border-color:#4e73df;
  box-shadow:0 0 8px rgba(78,115,223,0.4);
  outline:none;
}

input[type="date"]{
  text-transform:none;
}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(to right,#002147,#4e73df);
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
}

button:disabled{
  background:gray;
}

.message{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.success{color:green;}
.error-msg{color:red;}
.loading{color:#d35400;}

@media(max-width:768px){
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<h2>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h2>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
</div>

<div class="container">

<form id="mainForm">

<div class="form-row">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-row">
<label>Father Name</label>
<input type="text" name="father">
</div>

<div class="form-row">
<label>Mother Name</label>
<input type="text" name="mother">
</div>

<div class="form-row">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="form-row">
<label>Class</label>
<select name="class" required>
<option value="" disabled selected>-- SELECT CLASS --</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
</div>

<div class="form-row">
<label>Caste</label>
<input type="text" name="caste" placeholder="Enter Caste" required>
</div>

<div class="form-row">
<label>Village</label>
<input type="text" name="village">
</div>

<div class="form-row">
<label>Address</label>
<input type="text" name="address">
</div>

<div class="form-row">
<label>Subject</label>
<input type="text" name="subject">
</div>

<div class="form-row">
<label>APAAR ID</label>
<input type="text" name="apar">
</div>

<div class="form-row">
<label>AADHAR ID</label>
<input type="text" name="aadhar" maxlength="12" required>
</div>

<div class="form-row">
<label>Samagra ID</label>
<input type="text" name="samagra">
</div>

<div class="form-row">
<label>Account No</label>
<input type="text" name="account">
</div>

<div class="form-row">
<label>IFSC Code</label>
<input type="text" name="ifsc">
</div>

<div class="form-row">
<label>Bank Name</label>
<input type="text" name="bank">
</div>

<div class="form-row">
<label>Mobile</label>
<input type="text" name="mobile">
</div>

<div class="form-row">
<label>Photo</label>
<input type="file" id="photoInput" accept="image/*">
</div>

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

const form=document.getElementById("mainForm");
const msg=document.getElementById("msg");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

msg.innerHTML="Submitting... Please wait ⏳";
msg.className="message loading";
btn.disabled=true;

const formData=new FormData(form);
const file=document.getElementById("photoInput").files[0];

if(file){
const reader=new FileReader();
reader.onload=function(){
formData.append("photo",reader.result);
sendData(formData);
}
reader.readAsDataURL(file);
}else{
sendData(formData);
}

});

function sendData(formData){

fetch(scriptURL,{method:"POST",body:formData})
.then(response=>response.text())
.then(data=>{

if(data==="DUPLICATE"){
msg.innerHTML="⚠ Aadhaar already exists!";
msg.className="message error-msg";
btn.disabled=false;
return;
}

if(data==="SUCCESS"){
msg.innerHTML="Data Submitted Successfully ✅";
msg.className="message success";
form.reset();
btn.disabled=false;
}

})
.catch(()=>{
msg.innerHTML="Submission Failed ❌";
msg.className="message error-msg";
btn.disabled=false;
});

}

</script>

</body>
</html>
