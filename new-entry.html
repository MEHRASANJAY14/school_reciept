<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{font-family:Arial;background:linear-gradient(to right,#e3f2fd,#f4f6f9);margin:0}

.header{
  background:#002147;
  color:white;
  text-align:center;
  padding:18px;
}

.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.form-row{
  display:grid;
  grid-template-columns:220px 1fr;
  margin-bottom:14px;
}

label{font-weight:bold;}

input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  text-transform:uppercase;
}

button{
  width:100%;
  padding:12px;
  background:#002147;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:disabled{background:gray;}

.message{margin-top:15px;font-weight:bold;text-align:center}
.success{color:green}
.error-msg{color:red}
.loading{color:#d35400}

@media(max-width:768px){
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<h2>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h2>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
</div>

<div class="container">

<form id="mainForm">

<div class="form-row">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-row">
<label>Class</label>
<select name="class" required>
<option value="" disabled selected>-- SELECT CLASS --</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
</div>

<div class="form-row">
<label>Caste</label>
<select name="caste" required>
<option value="" disabled selected>-- SELECT CASTE --</option>
<option value="GENERAL">GENERAL</option>
<option value="EWS">EWS</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="OBC">OBC</option>
<option value="OTHER">OTHER</option>
</select>
</div>

<div class="form-row">
<label>Aadhaar</label>
<input type="text" name="aadhar" maxlength="12" required>
</div>

<div class="form-row">
<label>APAAR</label>
<input type="text" name="apar">
</div>

<div class="form-row">
<label>Samagra</label>
<input type="text" name="samagra">
</div>

<div class="form-row">
<label>Photo</label>
<input type="file" id="photoInput" accept="image/*">
</div>

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

const form=document.getElementById("mainForm");
const msg=document.getElementById("msg");
const btn=document.getElementById("submitBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

msg.innerHTML="Submitting... Please wait ⏳";
msg.className="message loading";
btn.disabled=true;

const formData=new FormData(form);
const file=document.getElementById("photoInput").files[0];

if(file){
const reader=new FileReader();
reader.onload=function(){
formData.append("photo",reader.result);
sendData(formData);
}
reader.readAsDataURL(file);
}else{
sendData(formData);
}

});

function sendData(formData){

fetch(scriptURL,{method:"POST",body:formData})
.then(response=>response.text())
.then(data=>{

if(data==="DUPLICATE"){
msg.innerHTML="⚠ Aadhaar already exists!";
msg.className="message error-msg";
btn.disabled=false;
return;
}

if(data==="SUCCESS"){
msg.innerHTML="Data Submitted Successfully ✅";
msg.className="message success";
form.reset();
btn.disabled=false;
}

})
.catch(()=>{
msg.innerHTML="Submission Failed ❌";
msg.className="message error-msg";
btn.disabled=false;
});

}

</script>

</body>
</html>
