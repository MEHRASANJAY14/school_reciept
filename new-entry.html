<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#0f2c59,#3f66c4);
}

.container{
  max-width:700px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  color:#0f2c59;
}

.form-group{
  margin-bottom:12px;
}

label{
  font-size:13px;
  font-weight:600;
  color:#0f2c59;
}

input, select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:4px;
  font-size:13px;
}

button{
  width:100%;
  padding:10px;
  background:#0f2c59;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin-top:10px;
}

button:hover{
  background:#163d7a;
}

.preview img{
  max-width:120px;
  border-radius:8px;
  margin-top:6px;
}

.message{
  text-align:center;
  margin-top:10px;
  font-weight:600;
}

.action-buttons{
  margin-top:15px;
  display:none;
  flex-direction:column;
  gap:8px;
}

.dashboard-btn{
  background:#0056b3 !important;
}

.print-btn{
  background:#c82333 !important;
}

.back-bottom{
  background:#6c757d !important;
  margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

<h2>New Student Entry</h2>

<form id="studentForm">

<div class="form-group">
<label>Student Name *</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Class *</label>
<select name="class" required>
<option value="">-- Select Class --</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>
</div>

<div class="form-group">
<label>Category *</label>
<select name="category" required>
<option value="">-- Select Category --</option>
<option>GENERAL</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>EWS</option>
<option>OTHER</option>
</select>
</div>

<div class="form-group">
<label>Aadhaar ID</label>
<input type="text" name="aadhar" maxlength="12">
</div>

<div class="form-group">
<label>Mobile</label>
<input type="text" name="mobile" maxlength="10">
</div>

<div class="form-group">
<label>Photo</label>
<input type="file" id="photo" accept="image/*">
<div class="preview" id="preview"></div>
</div>

<button type="submit">Submit</button>

<div class="message" id="msg"></div>

</form>

<div class="action-buttons" id="actions">
<button class="dashboard-btn" onclick="location.href='index.html'">🏠 Back to Dashboard</button>
<button onclick="location.reload()">➕ New Entry</button>
<button class="print-btn" onclick="printReceipt()">🖨 Print Receipt</button>
</div>

<button class="back-bottom" onclick="location.href='index.html'">⬅ Back</button>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

let receiptNumber="";

const form=document.getElementById("studentForm");
const msg=document.getElementById("msg");
const photoInput=document.getElementById("photo");
const preview=document.getElementById("preview");
const actions=document.getElementById("actions");

photoInput.addEventListener("change",function(){
  const file=this.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){
      preview.innerHTML='<img src="'+e.target.result+'">';
    }
    reader.readAsDataURL(file);
  }
});

form.addEventListener("submit",e=>{
  e.preventDefault();

  msg.style.color="blue";
  msg.innerText="Submitting... Please wait";

  receiptNumber="GHSS-"+Date.now();

  const formData=new FormData(form);
  formData.append("receipt",receiptNumber);

  fetch(scriptURL,{method:"POST",body:formData})
  .then(res=>res.text())
  .then(data=>{
    if(data.includes("SUCCESS")){
      msg.style.color="green";
      msg.innerText="Data Submitted Successfully!";
      form.reset();
      preview.innerHTML="";
      actions.style.display="flex";
    }else{
      msg.style.color="red";
      msg.innerText="Server Error: "+data;
    }
  })
  .catch(err=>{
    msg.style.color="red";
    msg.innerText="Submission Failed: "+err;
  });

});

function printReceipt(){
  window.open("print.html?receipt="+receiptNumber,"_blank");
}

</script>

</body>
</html>
