<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(to right, #e3f2fd, #f4f6f9);
  margin:0;
}

.header{
  background:#002147;
  color:white;
  text-align:center;
  padding:18px;
}

.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h3{
  text-align:center;
  margin-bottom:20px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input, select{
  padding:10px;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
  text-transform: uppercase;
}

button{
  grid-column:span 2;
  padding:12px;
  background:#002147;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  background:gray;
}

.message{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.success{ color:green; }
.loading{ color:#d35400; }

@media(max-width:768px){
  .form-grid{grid-template-columns:1fr}
  button{grid-column:span 1}
}
</style>
</head>

<body>

<div class="header">
<h2>Government Higher Secondary School</h2>
<p>Student Admission Form</p>
</div>

<div class="container">

<h3>Enter Student Details</h3>

<form id="mainForm" class="form-grid">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mother" placeholder="Mother Name">
<input type="date" id="dob">

<select id="class">
<option value="9" selected>9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>

<select id="caste">
<option value="GENERAL" selected>GENERAL</option>
<option value="EWS">EWS</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="OBC">OBC</option>
<option value="OTHER">OTHER</option>
</select>

<input type="text" id="village" placeholder="Village">
<input type="text" id="address" placeholder="Address">

<input type="text" id="subject" placeholder="Subject">
<input type="text" id="apar" placeholder="APAAR ID">

<input type="text" id="aadhar" placeholder="Aadhar No">
<input type="text" id="samagra" placeholder="Samagra ID">

<input type="text" id="bank" placeholder="Bank Name">
<input type="text" id="account" placeholder="Account No">

<input type="text" id="ifsc" placeholder="IFSC Code">
<input type="text" id="mobile" placeholder="Mobile">

<input type="file" id="photo" accept="image/*">

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

document.getElementById("mainForm").addEventListener("submit", function(e){

  e.preventDefault();

  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  msg.innerHTML = "Submitting... Please wait ⏳";
  msg.className = "message loading";
  btn.disabled = true;

  let file = document.getElementById("photo").files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      sendData(reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    sendData("");
  }

});

function sendData(photoData){

  var form=document.createElement("form");
  form.method="POST";
  form.action=scriptURL;

  let fields={
    name:name.value.toUpperCase(),
    father:father.value.toUpperCase(),
    mother:mother.value.toUpperCase(),
    dob:dob.value,
    class:document.getElementById("class").value,
    village:village.value.toUpperCase(),
    address:address.value.toUpperCase(),
    caste:document.getElementById("caste").value,
    category:document.getElementById("caste").value,
    subject:subject.value.toUpperCase(),
    apar:apar.value.toUpperCase(),
    aadhar:aadhar.value,
    samagra:samagra.value.toUpperCase(),
    account:account.value,
    ifsc:ifsc.value.toUpperCase(),
    bank:bank.value.toUpperCase(),
    mobile:mobile.value,
    photo:photoData
  };

  for(let key in fields){
    let input=document.createElement("input");
    input.type="hidden";
    input.name=key;
    input.value=fields[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();

  setTimeout(function(){
    msg.innerHTML="Data Submitted Successfully ✅";
    msg.className="message success";
    btn.disabled=false;
    document.getElementById("mainForm").reset();
  },2000);

}

</script>

</body>
</html>
