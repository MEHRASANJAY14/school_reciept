<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Entry</title>
</head>
<body>

<h2>Student Test (Name + Photo)</h2>

<form id="testForm">
  <input type="text" id="name" placeholder="Enter Name" required><br><br>
  <input type="file" id="photo" accept="image/*"><br><br>
  <button type="submit">Submit</button>
</form>

<p id="msg"></p>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

document.getElementById("testForm").addEventListener("submit", function(e){

  e.preventDefault();
  document.getElementById("msg").innerText = "Submitting...";

  let file = document.getElementById("photo").files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      sendData(reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    sendData("");
  }

});

function sendData(photoData){

  var form = document.createElement("form");
  form.method = "POST";
  form.action = scriptURL;

  var nameInput = document.createElement("input");
  nameInput.type = "hidden";
  nameInput.name = "name";
  nameInput.value = document.getElementById("name").value;

  var photoInput = document.createElement("input");
  photoInput.type = "hidden";
  photoInput.name = "photo";
  photoInput.value = photoData;

  form.appendChild(nameInput);
  form.appendChild(photoInput);

  document.body.appendChild(form);
  form.submit();
}

</script>

</body>
</html>
