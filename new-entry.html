<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.container { max-width:600px; margin:40px auto; background:white; padding:20px; border-radius:10px; }
input, select { width:100%; padding:8px; margin-bottom:10px; }
button { width:100%; padding:10px; background:#002147; color:white; border:none; }
</style>

</head>
<body>

<div class="container">

<h2>New Student Entry</h2>

<form id="mainForm">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="mobile" placeholder="Mobile">

<input type="file" id="photo" accept="image/*">

<button type="submit">Save Student</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwel43FZMg2tUZmfuVJ9WztUJUSJbJzJPX8Gkz90ovug4An16URtv2prPGsJHXBp1PD/exec";

document.getElementById("mainForm").addEventListener("submit", function(e){

  e.preventDefault();

  let file = document.getElementById("photo").files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      submitData(reader.result);
    };
    reader.readAsDataURL(file);
  } else {
    submitData("");
  }

});

function submitData(photoData){

  let form = document.createElement("form");
  form.method = "POST";
  form.action = scriptURL;

  let fields = {
    name: document.getElementById("name").value,
    mobile: document.getElementById("mobile").value,
    photo: photoData
  };

  for (let key in fields) {
    let input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = fields[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();

}

</script>

</body>
</html>
