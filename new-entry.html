<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.container{max-width:1000px;margin:30px auto;background:white;padding:20px;border-radius:10px}
h2{text-align:center}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
input{padding:8px;width:100%}
button{grid-column:span 2;padding:12px;background:#002147;color:white;border:none}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}button{grid-column:span 1}}
</style>
</head>
<body>

<div class="container">

<h2>Government Higher Secondary School</h2>
<h3 align="center">Student Admission Form</h3>

<form id="mainForm" class="form-grid">

<input type="text" id="name" placeholder="Student Name" required>
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mother" placeholder="Mother Name">
<input type="date" id="dob">
<input type="text" id="class" placeholder="Class">
<input type="text" id="category" placeholder="Category">
<input type="text" id="caste" placeholder="Caste">
<input type="text" id="mobile" placeholder="Mobile">
<input type="text" id="address" placeholder="Address">
<input type="text" id="apar" placeholder="APAAR ID">
<input type="text" id="aadhar" placeholder="Aadhar No">
<input type="text" id="samagra" placeholder="Samagra ID">
<input type="text" id="bank" placeholder="Bank Name">
<input type="text" id="account" placeholder="Account No">
<input type="text" id="ifsc" placeholder="IFSC Code">
<input type="file" id="photo" accept="image/*">

<button type="submit">Save Student</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

document.getElementById("mainForm").addEventListener("submit", function(e){

  e.preventDefault();

  let file=document.getElementById("photo").files[0];

  if(file){
    let reader=new FileReader();
    reader.onload=function(){sendData(reader.result);}
    reader.readAsDataURL(file);
  }else{
    sendData("");
  }

});

function sendData(photoData){

  var form=document.createElement("form");
  form.method="POST";
  form.action=scriptURL;

  let fields={
    name:document.getElementById("name").value,
    father:document.getElementById("father").value,
    mother:document.getElementById("mother").value,
    dob:document.getElementById("dob").value,
    class:document.getElementById("class").value,
    category:document.getElementById("category").value,
    caste:document.getElementById("caste").value,
    address:document.getElementById("address").value,
    apar:document.getElementById("apar").value,
    aadhar:document.getElementById("aadhar").value,
    samagra:document.getElementById("samagra").value,
    bank:document.getElementById("bank").value,
    account:document.getElementById("account").value,
    ifsc:document.getElementById("ifsc").value,
    mobile:document.getElementById("mobile").value,
    photo:photoData
  };

  for(let key in fields){
    let input=document.createElement("input");
    input.type="hidden";
    input.name=key;
    input.value=fields[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();

}

</script>

</body>
</html>
