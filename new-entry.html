<!DOCTYPE html>
<html>
<head>
<title>Print Receipt</title>
<style>
body{font-family:Arial}
.container{width:800px;margin:30px auto;border:2px solid black;padding:20px}
.photo{float:right;width:120px;height:150px;border:1px solid black}
</style>
</head>
<body>

<div class="container">
<h2 align="center">Government Higher Secondary School</h2>
<h3 align="center">Admission Receipt</h3>
<hr>

<img id="photo" class="photo">

<p><b>Receipt No:</b> <span id="receipt"></span></p>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Father Name:</b> <span id="father"></span></p>
<p><b>Class:</b> <span id="class"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>

<hr>
<p>This is computer generated receipt. No signature required.</p>

<button onclick="window.print()">Print</button>

</div>

<script>
const url=new URLSearchParams(window.location.search);
receipt.innerText=url.get("receipt");
name.innerText=url.get("name");
father.innerText=url.get("father");
class.innerText=url.get("class");
mobile.innerText=url.get("mobile");
photo.src=url.get("photo");
</script>

</body>
</html>
