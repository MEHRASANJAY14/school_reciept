<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission</title>

<style>
body{font-family:Arial;background:#f4f6f9}
.container{max-width:900px;margin:30px auto;background:white;padding:20px;border-radius:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
input,select{padding:8px;width:100%;text-transform:uppercase}
button{grid-column:span 2;padding:10px;background:#002147;color:white;border:none}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}button{grid-column:span 1}}
</style>

</head>
<body>

<div class="container">

<h2 align="center">Student Admission Form</h2>

<form method="POST" action="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec">

<input type="text" name="name" placeholder="Student Name" required>
<input type="text" name="father" placeholder="Father Name">

<input type="text" name="mother" placeholder="Mother Name">
<input type="date" name="dob">

<select name="class">
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>

<select name="caste">
<option value="GENERAL">GENERAL</option>
<option value="EWS">EWS</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="OBC">OBC</option>
<option value="OTHER">OTHER</option>
</select>

<input type="text" name="village" placeholder="Village">
<input type="text" name="address" placeholder="Address">

<input type="text" name="subject" placeholder="Subject">
<input type="text" name="apar" placeholder="APAAR ID">

<input type="text" name="aadhar" placeholder="Aadhar No">
<input type="text" name="samagra" placeholder="Samagra ID">

<input type="text" name="bank" placeholder="Bank Name">
<input type="text" name="account" placeholder="Account No">

<input type="text" name="ifsc" placeholder="IFSC Code">
<input type="text" name="mobile" placeholder="Mobile">

<input type="hidden" name="photo" id="photoData">

<button type="submit">Submit</button>

</form>

</div>

<script>
document.querySelector('form').addEventListener('submit', function(e){

  var fileInput = document.createElement("input");
  fileInput.type = "file";
});
</script>

</body>
</html>
