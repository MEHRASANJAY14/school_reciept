<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry - GHSS Singhpur</title>

<style>

body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

.header {
  background: #002147;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.section-title {
  border-bottom: 2px solid #002147;
  margin-top: 25px;
  padding-bottom: 5px;
  color: #002147;
  font-weight: bold;
}

.form-grid {
  display: grid;
  grid-template-columns: 200px 1fr 200px 1fr;
  gap: 10px 15px;
  align-items: center;
}

label {
  font-weight: bold;
}

input, select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #002147;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00509e;
}

@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}

.success-msg {
  margin-top: 15px;
  padding: 10px;
  background: #d4edda;
  color: #155724;
  border-radius: 5px;
  display: none;
}

</style>
</head>

<body>

<div class="header">
  <h2>Government Higher Secondary School</h2>
  <p>New Student Entry Form</p>
</div>

<div class="container">

<form id="studentForm">

<div class="section-title">Personal Details</div>
<div class="form-grid">

<label>Student Name</label>
<input type="text" id="name" required oninput="this.value=this.value.toUpperCase()">

<label>Father Name</label>
<input type="text" id="father" required oninput="this.value=this.value.toUpperCase()">

<label>Mother Name</label>
<input type="text" id="mother" required oninput="this.value=this.value.toUpperCase()">

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Class</label>
<select id="class" required>
<option value="">Select Class</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<label>Subject</label>
<input type="text" id="subject">

</div>

<div class="section-title">Category Details</div>
<div class="form-grid">

<label>Caste</label>
<input type="text" id="caste">

<label>Category</label>
<select id="category">
<option value="">Select</option>
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
</select>

<label>Address</label>
<input type="text" id="address">

</div>

<div class="section-title">ID Details</div>
<div class="form-grid">

<label>APAAR ID</label>
<input type="text" id="apar">

<label>Aadhar ID</label>
<input type="text" id="aadhar" maxlength="12" pattern="\d{12}" required>

<label>Samagra ID</label>
<input type="text" id="samagra">

</div>

<div class="section-title">Bank Details</div>
<div class="form-grid">

<label>Bank Name</label>
<input type="text" id="bank">

<label>Account No</label>
<input type="text" id="account">

<label>IFSC Code</label>
<input type="text" id="ifsc" oninput="this.value=this.value.toUpperCase()">

</div>

<div class="section-title">Contact</div>
<div class="form-grid">

<label>Mobile</label>
<input type="text" id="mobile" maxlength="10" pattern="\d{10}" required>

<label>Student Photo</label>
<input type="file" id="photo" accept="image/*" required>

</div>

<button type="submit">Save Student Data</button>

</form>

<div class="success-msg" id="successMsg">
Student data saved successfully!
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyQel4QVNj6i36arN8KK4ChLc2CJjEJtrKNVKmbqrgu6lGfjG3bk3-KMv77cVV19ACm/exec";

document.getElementById("studentForm").addEventListener("submit", function(e){

  e.preventDefault();

  if(!aadhar.checkValidity()){
    alert("Invalid Aadhar");
    return;
  }

  if(!mobile.checkValidity()){
    alert("Invalid Mobile");
    return;
  }

  let fileInput = document.getElementById("photo");
  let file = fileInput.files[0];

  if(!file){
    alert("Please upload photo");
    return;
  }

  let reader = new FileReader();

  reader.onloadend = function(){

    let data = {
      name: name.value,
      father: father.value,
      mother: mother.value,
      dob: dob.value,
      class: class.value,
      address: address.value,
      caste: caste.value,
      category: category.value,
      subject: subject.value,
      apar: apar.value,
      aadhar: aadhar.value,
      samagra: samagra.value,
      account: account.value,
      ifsc: ifsc.value,
      bank: bank.value,
      mobile: mobile.value,
      photo: reader.result
    };

    fetch(scriptURL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    })
    .then(response => response.text())
    .then(result => {
      alert("Student Data Saved Successfully ✅");
      document.getElementById("studentForm").reset();
    })
    .catch(error => {
      alert("Error Saving Data ❌");
      console.error(error);
    });

  };

  reader.readAsDataURL(file);

});

</script>

</body>
</html>
