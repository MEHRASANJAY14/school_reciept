<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Student Entry - GHSS Singhpur</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
}

.header {
  background: #002147;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.section-title {
  border-bottom: 2px solid #002147;
  margin-top: 25px;
  padding-bottom: 5px;
  color: #002147;
  font-weight: bold;
}

.form-grid {
  display: grid;
  grid-template-columns: 200px 1fr 200px 1fr;
  gap: 10px 15px;
  align-items: center;
}

label {
  font-weight: bold;
}

input, select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #002147;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00509e;
}

@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<div class="header">
  <h2>Government Higher Secondary School</h2>
  <p>New Student Entry Form</p>
</div>

<div class="container">

<form id="studentForm">

<div class="section-title">Personal Details</div>
<div class="form-grid">

<label>Student Name</label>
<input type="text" id="name" required>

<label>Father Name</label>
<input type="text" id="father" required>

<label>Mother Name</label>
<input type="text" id="mother" required>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Class</label>
<select id="class" required>
<option value="">Select Class</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<label>Subject</label>
<input type="text" id="subject">

</div>

<div class="section-title">Category Details</div>
<div class="form-grid">

<label>Caste</label>
<input type="text" id="caste">

<label>Category</label>
<select id="category">
<option value="">Select</option>
<option>General</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
</select>

<label>Address</label>
<input type="text" id="address">

</div>

<div class="section-title">ID Details</div>
<div class="form-grid">

<label>APAAR ID</label>
<input type="text" id="apar">

<label>Aadhar ID</label>
<input type="text" id="aadhar" maxlength="12" required>

<label>Samagra ID</label>
<input type="text" id="samagra">

</div>

<div class="section-title">Bank Details</div>
<div class="form-grid">

<label>Bank Name</label>
<input type="text" id="bank">

<label>Account No</label>
<input type="text" id="account">

<label>IFSC Code</label>
<input type="text" id="ifsc">

</div>

<div class="section-title">Contact</div>
<div class="form-grid">

<label>Mobile</label>
<input type="text" id="mobile" maxlength="10" required>

<label>Student Photo</label>
<input type="file" id="photo" accept="image/*">

</div>

<button type="submit">Save Student Data</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyQel4QVNj6i36arN8KK4ChLc2CJjEJtrKNVKmbqrgu6lGfjG3bk3-KMv77cVV19ACm/exec";

document.getElementById("studentForm").addEventListener("submit", function(e){

  e.preventDefault();

  let formData = new FormData();

  formData.append("name", name.value);
  formData.append("father", father.value);
  formData.append("mother", mother.value);
  formData.append("dob", dob.value);
  formData.append("class", class.value);
  formData.append("address", address.value);
  formData.append("caste", caste.value);
  formData.append("category", category.value);
  formData.append("subject", subject.value);
  formData.append("apar", apar.value);
  formData.append("aadhar", aadhar.value);
  formData.append("samagra", samagra.value);
  formData.append("account", account.value);
  formData.append("ifsc", ifsc.value);
  formData.append("bank", bank.value);
  formData.append("mobile", mobile.value);

  let file = document.getElementById("photo").files[0];

  if(file){
    let reader = new FileReader();
    reader.onload = function(){
      formData.append("photo", reader.result);
      sendData(formData);
    };
    reader.readAsDataURL(file);
  } else {
    formData.append("photo", "");
    sendData(formData);
  }

});

function sendData(formData){

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(response => {
    alert("Student Data Saved Successfully ✅");
    document.getElementById("studentForm").reset();
  })
  .catch(error => {
    alert("Error Saving Data ❌");
    console.error(error);
  });

}

</script>

</body>
</html>
