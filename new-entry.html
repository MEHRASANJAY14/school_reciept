<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#002147,#4e73df);
  margin:0;
}

.header{
  text-align:center;
  color:white;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:20px auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.form-row{
  display:grid;
  grid-template-columns:220px 1fr;
  margin-bottom:15px;
  align-items:center;
}

label{
  font-weight:bold;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%;
}

button{
  width:100%;
  padding:12px;
  background:#002147;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

button:disabled{
  background:gray;
}

.message{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.success{color:green;}
.error{color:red;}

@media(max-width:768px){
  .form-row{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
<h2>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h2>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
</div>

<div class="container">

<form id="mainForm">

<div class="form-row">
<label>Student Name</label>
<input type="text" name="name" required>
</div>

<div class="form-row">
<label>Father Name</label>
<input type="text" name="father">
</div>

<div class="form-row">
<label>Mother Name</label>
<input type="text" name="mother">
</div>

<div class="form-row">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="form-row">
<label>Class</label>
<select name="class" required>
<option value="" disabled selected>-- SELECT CLASS --</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>
</div>

<div class="form-row">
<label>Village</label>
<input type="text" name="village">
</div>

<div class="form-row">
<label>Address</label>
<input type="text" name="address">
</div>

<div class="form-row">
<label>Caste</label>
<input type="text" name="caste" required>
</div>

<div class="form-row">
<label>Category</label>
<select name="category" required>
<option value="" disabled selected>-- SELECT CATEGORY --</option>
<option value="GENERAL">GENERAL</option>
<option value="EWS">EWS</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
<option value="OBC">OBC</option>
<option value="OTHER">OTHER</option>
</select>
</div>

<div class="form-row">
<label>Subject</label>
<input type="text" name="subject">
</div>

<div class="form-row">
<label>APAAR ID</label>
<input type="text" name="apar">
</div>

<div class="form-row">
<label>Aadhaar ID</label>
<input type="text" name="aadhar" maxlength="12" required>
</div>

<div class="form-row">
<label>Samagra ID</label>
<input type="text" name="samagra">
</div>

<div class="form-row">
<label>Account No</label>
<input type="text" name="account">
</div>

<div class="form-row">
<label>IFSC Code</label>
<input type="text" name="ifsc">
</div>

<div class="form-row">
<label>Bank Name</label>
<input type="text" name="bank">
</div>

<div class="form-row">
<label>Mobile</label>
<input type="text" name="mobile">
</div>

<div class="form-row">
<label>Photo</label>
<input type="file" id="photoInput" accept="image/*">
</div>

<button type="submit" id="submitBtn">Submit Form</button>

</form>

<div id="msg" class="message"></div>

</div>

<script>

// 🔴 Replace with your real Apps Script URL
const scriptURL = "YOUR_APPS_SCRIPT_URL_HERE";

const form = document.getElementById("mainForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e){

  e.preventDefault();
  msg.innerHTML = "Submitting... Please wait ⏳";
  msg.className = "message";
  btn.disabled = true;

  const formData = new FormData(form);
  const file = document.getElementById("photoInput").files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      formData.append("photo", reader.result);
      sendData(formData);
    }
    reader.readAsDataURL(file);
  } else {
    sendData(formData);
  }

});

function sendData(formData){

  fetch(scriptURL,{
    method:"POST",
    body:formData
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "DUPLICATE"){
      msg.innerHTML = "⚠ Aadhaar already exists!";
      msg.className = "message error";
      btn.disabled = false;
      return;
    }

    if(data.status === "SUCCESS"){
      msg.innerHTML = "Data Submitted Successfully ✅";
      msg.className = "message success";
      form.reset();
      btn.disabled = false;
    }

  })
  .catch(()=>{
    msg.innerHTML = "Submission Failed ❌";
    msg.className = "message error";
    btn.disabled = false;
  });

}

</script>

</body>
</html>
