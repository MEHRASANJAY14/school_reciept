<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Receipt</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

.receipt-container{
  width:800px;
  margin:0 auto;
  background:#ffffff;
  padding:25px;
  border:2px solid #000;
}

.header{
  text-align:center;
}

.header h2{
  margin:0;
  font-size:20px;
}

.header p{
  margin:3px 0;
  font-size:14px;
}

.title{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
}

.photo-box{
  float:right;
  width:120px;
  height:150px;
  border:1px solid #000;
  object-fit:cover;
}

.details{
  margin-top:20px;
  font-size:14px;
}

.details table{
  width:100%;
  border-collapse:collapse;
}

.details td{
  padding:6px 4px;
  vertical-align:top;
}

.label{
  font-weight:bold;
  width:180px;
}

.footer{
  margin-top:25px;
  text-align:center;
  font-size:12px;
}

.button-area{
  text-align:center;
  margin-top:20px;
}

button{
  padding:8px 15px;
  background:#002147;
  color:white;
  border:none;
  cursor:pointer;
  margin:5px;
}

button:hover{
  background:#004080;
}

@media print{
  body{
    background:white;
    padding:0;
  }
  .button-area{
    display:none;
  }
}

@media(max-width:850px){
  .receipt-container{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="receipt-container" id="receipt">

<div class="header">
<h2>GOVT HIGHER SECONDARY SCHOOL SINGHPUR</h2>
<p>Block: Jabera | District: Damoh (M.P.)</p>
<p>Established: 1985</p>
</div>

<hr>

<div class="title">ADMISSION RECEIPT</div>

<img id="photo" class="photo-box">

<div class="details">
<table>

<tr>
<td class="label">Student ID</td>
<td>: <span id="studentID"></span></td>
</tr>

<tr>
<td class="label">Student Name</td>
<td>: <span id="name"></span></td>
</tr>

<tr>
<td class="label">Father Name</td>
<td>: <span id="father"></span></td>
</tr>

<tr>
<td class="label">Class</td>
<td>: <span id="class"></span></td>
</tr>

<tr>
<td class="label">Caste</td>
<td>: <span id="caste"></span></td>
</tr>

<tr>
<td class="label">Category</td>
<td>: <span id="category"></span></td>
</tr>

<tr>
<td class="label">Aadhaar Number</td>
<td>: <span id="aadhar"></span></td>
</tr>

<tr>
<td class="label">Mobile Number</td>
<td>: <span id="mobile"></span></td>
</tr>

<tr>
<td class="label">Date</td>
<td>: <span id="date"></span></td>
</tr>

</table>
</div>

<hr>

<div class="footer">
This is a computer generated receipt. No signature required.
</div>

</div>

<div class="button-area">
<button onclick="window.print()">🖨 Print Receipt</button>
<button onclick="window.print()">⬇ Download as PDF</button>
</div>

<script>

// Get URL parameters
const params = new URLSearchParams(window.location.search);

// Fill data safely
document.getElementById("studentID").innerText = params.get("id") || "";
document.getElementById("name").innerText = params.get("name") || "";
document.getElementById("father").innerText = params.get("father") || "";
document.getElementById("class").innerText = params.get("class") || "";
document.getElementById("caste").innerText = params.get("caste") || "";
document.getElementById("category").innerText = params.get("category") || "";
document.getElementById("aadhar").innerText = params.get("aadhar") || "";
document.getElementById("mobile").innerText = params.get("mobile") || "";
document.getElementById("date").innerText = new Date().toLocaleDateString();

// Photo
const photoURL = params.get("photo");
if(photoURL){
  document.getElementById("photo").src = photoURL;
}else{
  document.getElementById("photo").style.display="none";
}

</script>

</body>
</html>
