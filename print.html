<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Receipt</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
}

.container{
  width:800px;
  margin:20px auto;
  background:white;
  padding:25px;
  border:2px solid black;
}

.header{
  text-align:center;
}

.school-name{
  font-size:20px;
  font-weight:bold;
}

.photo{
  float:right;
  width:120px;
  height:150px;
  border:1px solid black;
  object-fit:cover;
}

.details{
  margin-top:20px;
}

.details p{
  margin:8px 0;
  font-size:15px;
}

.footer{
  margin-top:25px;
  text-align:center;
  font-size:12px;
}

.button-area{
  text-align:center;
  margin-top:20px;
}

button{
  padding:8px 15px;
  background:#002147;
  color:white;
  border:none;
  cursor:pointer;
  margin:5px;
}

@media print{
  .button-area{display:none;}
  body{background:white;}
}
</style>
</head>

<body>

<div class="container" id="receipt">

<div class="header">
<div class="school-name">GOVT HIGHER SECONDARY SCHOOL SINGHPUR</div>
<div>Block: Jabera | District: Damoh (M.P.)</div>
<div>Established: 1985</div>
<hr>
<h3>Admission Receipt</h3>
</div>

<img id="photo" class="photo">

<div class="details">
<p><b>Student ID:</b> <span id="studentID"></span></p>
<p><b>Student Name:</b> <span id="name"></span></p>
<p><b>Father Name:</b> <span id="father"></span></p>
<p><b>Class:</b> <span id="class"></span></p>
<p><b>Caste:</b> <span id="caste"></span></p>
<p><b>Category:</b> <span id="category"></span></p>
<p><b>Aadhaar:</b> <span id="aadhar"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
</div>

<hr>

<div class="footer">
This is a computer generated receipt. No signature required.
</div>

</div>

<div class="button-area">
<button onclick="window.print()">🖨 Print Receipt</button>
<button onclick="window.print()">⬇ Download PDF</button>
</div>
