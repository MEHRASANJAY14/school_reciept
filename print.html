<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admission Receipt</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.receipt{
width:800px;
background:#fff;
margin:auto;
padding:20px;
border:2px solid #000;
position:relative;
}

h2{
text-align:center;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:6px;
font-size:14px;
}

.label{
font-weight:bold;
width:200px;
}

/* PHOTO BOX */

.photo-box{
position:absolute;
top:110px;
right:30px;
width:120px;
height:140px;
border:2px solid #000;
overflow:hidden;
}

.photo-box img{
width:100%;
height:100%;
object-fit:cover;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
}

.buttons{
text-align:center;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
background:#0d47a1;
color:#fff;
border:none;
cursor:pointer;
}

/* PRINT FIX */

@media print{

body{
background:#fff;
}

.buttons{
display:none;
}

.receipt{
width:100%;
border:2px solid #000;
}

}

</style>
</head>

<body>

<div class="receipt">

<h2>ADMISSION RECEIPT</h2>

<div class="photo-box">
<img id="photo">
</div>

<table>

<tr><td class="label">Student ID</td><td id="sid"></td></tr>
<tr><td class="label">Student Name</td><td id="name"></td></tr>
<tr><td class="label">Father Name</td><td id="father"></td></tr>
<tr><td class="label">Mother Name</td><td id="mother"></td></tr>
<tr><td class="label">Date of Birth</td><td id="dob"></td></tr>
<tr><td class="label">Class</td><td id="class"></td></tr>
<tr><td class="label">Village</td><td id="village"></td></tr>
<tr><td class="label">Address</td><td id="address"></td></tr>
<tr><td class="label">Caste</td><td id="caste"></td></tr>
<tr><td class="label">Category</td><td id="category"></td></tr>
<tr><td class="label">Subject</td><td id="subject"></td></tr>
<tr><td class="label">APAAR ID</td><td id="apaar"></td></tr>
<tr><td class="label">Aadhaar ID</td><td id="aadhaar"></td></tr>
<tr><td class="label">Samagra ID</td><td id="samagra"></td></tr>
<tr><td class="label">Account No</td><td id="account"></td></tr>
<tr><td class="label">IFSC Code</td><td id="ifsc"></td></tr>
<tr><td class="label">Bank Name</td><td id="bank"></td></tr>
<tr><td class="label">Mobile</td><td id="mobile"></td></tr>
<tr><td class="label">Date Generated</td><td id="date"></td></tr>

</table>

<div class="footer">
This is a computer generated receipt. No signature required.
</div>

</div>

<div class="buttons">
<button onclick="window.print()">Print Receipt</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("sid").innerHTML=": "+params.get("sid");
document.getElementById("name").innerHTML=": "+params.get("name");
document.getElementById("father").innerHTML=": "+params.get("father");
document.getElementById("mother").innerHTML=": "+params.get("mother");
document.getElementById("dob").innerHTML=": "+params.get("dob");
document.getElementById("class").innerHTML=": "+params.get("class");
document.getElementById("village").innerHTML=": "+params.get("village");
document.getElementById("address").innerHTML=": "+params.get("address");
document.getElementById("caste").innerHTML=": "+params.get("caste");
document.getElementById("category").innerHTML=": "+params.get("category");
document.getElementById("subject").innerHTML=": "+params.get("subject");
document.getElementById("apaar").innerHTML=": "+params.get("apaar");
document.getElementById("aadhaar").innerHTML=": "+params.get("aadhaar");
document.getElementById("samagra").innerHTML=": "+params.get("samagra");
document.getElementById("account").innerHTML=": "+params.get("account");
document.getElementById("ifsc").innerHTML=": "+params.get("ifsc");
document.getElementById("bank").innerHTML=": "+params.get("bank");
document.getElementById("mobile").innerHTML=": "+params.get("mobile");
document.getElementById("date").innerHTML=": "+params.get("date");

/* PHOTO LOAD */

const photo=params.get("photo");

if(photo){
document.getElementById("photo").src=photo;
}else{
document.getElementById("photo").src="no-photo.png";
}

</script>

</body>
</html>
