<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Search Student Record</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1976d2,#0d47a1);
margin:0;
padding:40px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:80%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
margin-bottom:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.search-btn{
background:#1976d2;
color:white;
}

.back-btn{
background:#6c757d;
color:white;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#1976d2;
color:white;
}

.print-btn{
background:#28a745;
color:white;
padding:6px 12px;
border-radius:4px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Search Student Record</h2>

<input 
type="text" 
id="searchText"
placeholder="Enter Name / Aadhaar / Student ID"
onkeypress="if(event.key==='Enter'){searchStudent()}"
>

<br>

<button class="search-btn" onclick="searchStudent()">Search</button>

<table id="resultTable">

<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Aadhaar</th>
<th>Class</th>
<th>Print</th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="back-btn" onclick="window.location.href='index.html'">
← Back to Dashboard
</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

async function searchStudent(){

let text=document.getElementById("searchText").value.trim();

if(text==""){
alert("Enter Name / Aadhaar / Student ID");
return;
}

let url=API_URL+"?search="+encodeURIComponent(text);

try{

let response=await fetch(url);
let raw=await response.text();

if(raw=="OK"){
alert("Apps Script still returning OK. Redeploy script.");
return;
}

let data=JSON.parse(raw);

let tbody=document.querySelector("#resultTable tbody");

tbody.innerHTML="";

if(data.length==0){

tbody.innerHTML="<tr><td colspan='5'>No Record Found</td></tr>";
return;

}

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${row.studentID}</td>
<td>${row.name}</td>
<td>${row.aadhar}</td>
<td>${row.class}</td>

<td>
<a class="print-btn" target="_blank"
href="print.html?studentID=${row.studentID}&name=${encodeURIComponent(row.name)}&aadhar=${row.aadhar}&class=${row.class}&photo=${encodeURIComponent(row.photo)}">
Print
</a>
</td>

`;

tbody.appendChild(tr);

});

}catch(err){

alert("Search Error: "+err);

}

}

</script>

</body>

</html>
