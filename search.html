<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Student Record</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e73be,#3fa9f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#fff;
padding:30px;
border-radius:10px;
width:800px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:70%;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#1e73be;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#155a96;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#1e73be;
color:white;
padding:10px;
}

td{
padding:8px;
border:1px solid #ddd;
}

.printBtn{
background:green;
color:white;
padding:5px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

.printBtn:hover{
background:#0b7a0b;
}

.back{
margin-top:20px;
background:#888;
}

#loading{
display:none;
margin-top:10px;
color:#1e73be;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Search Student Record</h2>

<input type="text" id="searchInput" placeholder="Search by Name / Aadhaar / Student ID">

<br><br>

<button id="searchBtn" onclick="searchStudent()">Search</button>

<div id="loading">Searching...</div>

<table id="resultTable">

<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Aadhaar</th>
<th>Class</th>
<th>Print</th>
</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="back" onclick="location.href='index.html'">← Back to Dashboard</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw4IzobidmRMtuW2t71IgekL9bnzDPSC5ISb5E7RcQgqaqfDRjJXRzc3cfDuLQfIlZA/exec";

function searchStudent(){

let query=document.getElementById("searchInput").value;

if(query===""){
alert("Enter Name / Aadhaar / Student ID");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("searchBtn").disabled=true;

fetch(API_URL+"?search="+encodeURIComponent(query))

.then(res=>res.json())

.then(data=>{

let tbody=document.querySelector("#resultTable tbody");

tbody.innerHTML="";

data.forEach(r=>{

let row=`
<tr>
<td>${r.studentID}</td>
<td>${r.name}</td>
<td>${r.aadhar}</td>
<td>${r.class}</td>

<td>

<button class="printBtn" onclick="printReceipt('${encodeURIComponent(r.studentID)}','${encodeURIComponent(r.name)}','${encodeURIComponent(r.father)}','${encodeURIComponent(r.mother)}','${encodeURIComponent(r.dob)}','${encodeURIComponent(r.class)}','${encodeURIComponent(r.village)}','${encodeURIComponent(r.address)}','${encodeURIComponent(r.caste)}','${encodeURIComponent(r.category)}','${encodeURIComponent(r.subject)}','${encodeURIComponent(r.apar)}','${encodeURIComponent(r.aadhar)}','${encodeURIComponent(r.samagra)}','${encodeURIComponent(r.account)}','${encodeURIComponent(r.ifsc)}','${encodeURIComponent(r.bank)}','${encodeURIComponent(r.mobile)}','${encodeURIComponent(r.photo)}')">Print</button>

</td>
</tr>
`;

tbody.innerHTML+=row;

});

document.getElementById("loading").style.display="none";
document.getElementById("searchBtn").disabled=false;

})

.catch(err=>{

document.getElementById("loading").style.display="none";
document.getElementById("searchBtn").disabled=false;

alert("Search Error");

console.log(err);

});

}

function printReceipt(studentID,name,father,mother,dob,cls,village,address,caste,category,subject,apar,aadhar,samagra,account,ifsc,bank,mobile,photo){

let url="print.html?"
+"studentID="+studentID
+"&name="+name
+"&father="+father
+"&mother="+mother
+"&dob="+dob
+"&class="+cls
+"&village="+village
+"&address="+address
+"&caste="+caste
+"&category="+category
+"&subject="+subject
+"&apar="+apar
+"&aadhar="+aadhar
+"&samagra="+samagra
+"&account="+account
+"&ifsc="+ifsc
+"&bank="+bank
+"&mobile="+mobile
+"&photo="+photo;

window.open(url,"_blank");

}

</script>

</body>
</html>
